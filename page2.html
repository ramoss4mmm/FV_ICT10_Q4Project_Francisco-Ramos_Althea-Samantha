            padding: 10px 15px;

        h1 {

        }
        #textofnav{
            color: #F39EB6;

            font-weight: bold;
            font-size: 20px;
            position: relative;
            font-size: 20px;
            position: relative;
	    }

	    #textofnav::after{
            content: '';
            height: 4px;
            width: 0%;
            margin: 0 auto;
            background-color: #F39EB6;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            transition: all 0.3s;
        }

        #textofnav:hover::after{
            width: 100%;
        }
        #show_graph {
           background-color: #ff84a5;
           color: white;
           border: none;
           border-radius: 10px;
           padding: 10px 20px;
           font-family: 'Courier New', Courier, monospace;
           font-weight: bold;
        }

        #show_graph:hover {
           background-color: #ffabc1;
        }
    </style>

 <br>

        <div class="row"> 

            <label for="day">Select day</label> <!-- label for day-->
            <select id="day">
                <option disabled selected>Select day</option> 
                <option id="monday">Monday</option>
                <option id="tuesday">Tuesday</option>
                <option id="wednesday">Wednesday</option>
                <option id="thursday">Thursday</option>
                <option id="friday">Friday</option>
            </select> <!--select day-->

            <br><br>

            <label for="absences">Absences</label> <!--label for absences-->

        </div>
